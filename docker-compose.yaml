# nginx proxy address - http://172.17.0.1:8072

name: snipe-it
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "5m"
    max-file: "1"

services:
  app:
    image: snipe/snipe-it:latest
    pull_policy: always
    container_name: snipe-it-app
    hostname: ${BASE_HOST_NAME:-$HOSTNAME}
    restart: always
    logging: *default-logging
    networks:
      - snipe-it
    ports:
      - "172.17.0.1:8072:80"
    environment:
      TZ: ${TZ:-America/New_York}
      APP_URL: https://${BASE_HOST_NAME:-$HOSTNAME}.${BASE_DOMAIN_NAME:-example.com}
      APP_KEY: ${APP_SECRET_KEY:-changeme_secret_key_min_32_chars}
      DB_CONNECTION: mysql
      DB_HOST: snipe-it-db
      DB_PORT: 3306
      DB_DATABASE: ${DB_CREATE_DATABASE_NAME:-snipe-it}
      DB_USERNAME: ${DB_USER_NAME:-snipe-it}
      DB_PASSWORD: ${DB_USER_PASS:-changeme_db_password}
      MAIL_ENV_FROM_ADDR: ${EMAIL_SERVER_MAIL_FROM:-noreply@example.com}
      MAIL_ENV_FROM_NAME: ${BASE_HOST_NAME:-$HOSTNAME}
      MAIL_ENV_DRIVER: smtp
      MAIL_PORT_587_TCP_ADDR: ${EMAIL_SERVER_HOST:-localhost}
      MAIL_PORT_587_TCP_PORT: ${EMAIL_SERVER_PORT:-587}
    volumes:
      - ./volumes/data/snipe-it/data:/var/lib/snipeit
    depends_on:
      snipe-it-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3

  snipe-it-db:
    image: mariadb:latest
    pull_policy: always
    container_name: snipe-it-db
    hostname: snipe-it-db
    restart: always
    logging: *default-logging
    networks:
      - snipe-it
    environment:
      TZ: ${TZ:-America/New_York}
      MARIADB_DATABASE: ${DB_CREATE_DATABASE_NAME:-snipe-it}
      MARIADB_USER: ${DB_USER_NAME:-snipe-it}
      MARIADB_PASSWORD: ${DB_USER_PASS:-changeme_db_password}
      MARIADB_ROOT_PASSWORD: ${DB_ADMIN_PASS:-changeme_admin_password}
    volumes:
      - ./volumes/data/db/mariadb/snipe-it:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  snipe-it:
    name: snipe-it
    external: false
