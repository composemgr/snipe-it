# nginx proxy address - http://172.17.0.1:8072

name: snipe-it
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "5m"
    max-file: "1"

services:
  app:
    image: snipe/snipe-it:latest
    pull_policy: always
    container_name: snipe-it-app
    hostname: ${BASE_HOST_NAME:-$HOSTNAME}
    restart: always
    logging: *default-logging
    networks:
      - snipe-it
      - proxy
      - cloudflare
    ports:
      - "172.17.0.1:8072:80"
    environment:
      TZ: ${TZ:-America/New_York}
      APP_URL: https://${BASE_HOST_NAME:-$HOSTNAME}.${BASE_DOMAIN_NAME:-example.com}
      APP_KEY: ${APP_SECRET_KEY:-changeme_secret_key_min_32_chars}
      DB_CONNECTION: mysql
      DB_HOST: snipe-it-db
      DB_PORT: 3306
      DB_DATABASE: ${DB_CREATE_DATABASE_NAME:-snipe-it}
      DB_USERNAME: ${DB_USER_NAME:-snipe-it}
      DB_PASSWORD: ${DB_USER_PASS:-changeme_db_password}
      MAIL_FROM_ADDR: ${EMAIL_SERVER_MAIL_FROM:-noreply@example.com}
      MAIL_FROM_NAME: ${BASE_HOST_NAME:-$HOSTNAME}
      MAIL_MAILER: smtp
      MAIL_HOST: ${EMAIL_SERVER_HOST:-localhost}
      MAIL_PORT: ${EMAIL_SERVER_PORT:-587}
      MAIL_USERNAME: ${EMAIL_SERVER_LOGIN_NAME:-}
      MAIL_PASSWORD: ${EMAIL_SERVER_LOGIN_PASS:-}
      CONTAINER_NAME: snipe-it-app
      HOSTNAME: ${BASE_HOST_NAME:-$HOSTNAME}
    volumes:
      - ./volumes/data/snipe-it/data:/var/lib/snipeit
    depends_on:
      snipe-it-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3
    labels:
      - 'traefik.enable=true'
      - 'cloudflare.enable=true'
      - 'traefik.docker.network=proxy'
      - 'cloudflare.service=http://snipe-it-app:80'
      - 'cloudflare.hostname=snipe-it.${CLOUDFLARE_ZONE_NAME:-}'
      - 'traefik.http.routers.snipe-it-app.entrypoints=http'
      - 'traefik.http.routers.snipe-it-app-secure.tls=true'
      - 'traefik.http.routers.snipe-it-app.rule=Host($(${BASE_HOST_NAME:-$HOSTNAME}))'
      - 'traefik.http.middlewares.snipe-it-app-https-redirect.redirectscheme.scheme=https'
      - 'traefik.http.routers.snipe-it-app.middlewares=snipe-it-app-https-redirect'
      - 'traefik.http.routers.snipe-it-app-secure.entrypoints=https'
      - 'traefik.http.routers.snipe-it-app-secure.rule=Host($(${BASE_HOST_NAME:-$HOSTNAME}))'
      - 'traefik.http.routers.snipe-it-app-secure.tls.certresolver=cloudflare'
      - 'traefik.http.routers.snipe-it-app-secure.service=snipe-it-app'
      - 'traefik.http.services.snipe-it-app.loadbalancer.server.port=80'

  snipe-it-db:
    image: mariadb:latest
    pull_policy: always
    container_name: snipe-it-db
    hostname: snipe-it-db
    restart: always
    logging: *default-logging
    networks:
      - snipe-it
    environment:
      TZ: ${TZ:-America/New_York}
      MARIADB_DATABASE: ${DB_CREATE_DATABASE_NAME:-snipe-it}
      MARIADB_USER: ${DB_USER_NAME:-snipe-it}
      MARIADB_PASSWORD: ${DB_USER_PASS:-changeme_db_password}
      MARIADB_ROOT_PASSWORD: ${DB_ADMIN_PASS:-changeme_admin_password}
      CONTAINER_NAME: snipe-it-db
    volumes:
      - ./volumes/data/db/mariadb/snipe-it:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  snipe-it:
    name: snipe-it
    external: false
  proxy:
    external: true
  cloudflare:
    external: true
